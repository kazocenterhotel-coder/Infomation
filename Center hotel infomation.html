<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes">
    <title>Center Hotel Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            background-color: #d1d5db;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-overflow-scrolling: touch;
            /* Image protection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        #pdf-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 8px 0;
        }
        .page-canvas {
            display: block;
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            /* Image protection */
            pointer-events: none;
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
        #loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
            font-size: 16px;
        }
        #error-msg {
            text-align: center;
            padding: 40px 20px;
            color: #ef4444;
            font-size: 14px;
            display: none;
        }
        #error-msg a {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        /* Transparent overlay to block interaction with canvas */
        .page-shield {
            position: relative;
        }
        .page-shield::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="pdf-container">
        <div id="loading-msg">読み込み中...</div>
        <div id="error-msg">
            PDFの表示に失敗しました。<br>
            <a id="direct-link" href="加須センターホテルinfo_最終.pdf">PDFを直接開く</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
    (function() {
        // === Image Protection ===
        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable drag
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        // Disable keyboard shortcuts for save / print / dev tools
        document.addEventListener('keydown', function(e) {
            // Ctrl+S, Ctrl+P, Ctrl+Shift+I, F12
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        });

        // === PDF Rendering ===
        var pdfUrl = encodeURI('加須センターホテルinfo_最終.pdf');
        var container = document.getElementById('pdf-container');
        var loadingMsg = document.getElementById('loading-msg');
        var errorMsg = document.getElementById('error-msg');

        if (typeof pdfjsLib === 'undefined') {
            loadingMsg.style.display = 'none';
            errorMsg.style.display = 'block';
            return;
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        var screenWidth = window.screen.width * (window.devicePixelRatio || 1);
        var renderScale = screenWidth > 1500 ? 2.0 : 1.5;

        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
            loadingMsg.style.display = 'none';
            var totalPages = pdf.numPages;

            function renderPage(pageNum) {
                if (pageNum > totalPages) return;

                pdf.getPage(pageNum).then(function(page) {
                    var viewport = page.getViewport({ scale: renderScale });
                    var canvas = document.createElement('canvas');
                    canvas.className = 'page-canvas';
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    var ctx = canvas.getContext('2d');

                    // Wrap canvas in shield div to prevent long-press save
                    var shield = document.createElement('div');
                    shield.className = 'page-shield';
                    shield.appendChild(canvas);
                    container.appendChild(shield);

                    page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    }).promise.then(function() {
                        renderPage(pageNum + 1);
                    }).catch(function(err) {
                        console.error('Render error page ' + pageNum + ':', err);
                        renderPage(pageNum + 1);
                    });
                }).catch(function(err) {
                    console.error('Get page error ' + pageNum + ':', err);
                    renderPage(pageNum + 1);
                });
            }

            renderPage(1);

        }).catch(function(err) {
            console.error('PDF load error:', err);
            loadingMsg.style.display = 'none';
            errorMsg.style.display = 'block';
        });
    })();
    </script>
</body>
</html>
